version: '3.8'

services:
  vision-stream:
    build: .
    container_name: vision-stream-x100
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NODE_ENV=development
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    restart: always
